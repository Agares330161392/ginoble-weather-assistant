databases:
  - name: ginoble-reports-db
    plan: free

services:
  - type: web
    name: ginoble-weather-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 1 --threads 4 --timeout 120
    envVars:
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: XHS_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.12"
      - key: DATABASE_URL
        fromDatabase: ginoble-reports-db
        property: connectionString
